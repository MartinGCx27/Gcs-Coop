{% extends 'dashboard/base.html' %}
{% load static %}

{% block title %}
    Revista digital
{% endblock %}

{% block content %}
<section>
    <div class="container-fluid">
        <div class="row">
            <div class="col">
                <div class="jumbotron jumbotron-fluid">
                    <div class="container">
                      <h1 class="display-4">Revista digital</h1>
                      <p class="lead">Aqui encontraras la edición mensual de nuestra revista digital</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
<section>
    <div class="container">
        <div class="row">
            <div class="col-lg-12 col-md-12 col-12">
                <div class="alert alert-primary" role="alert">
                    Haz click en el botón para descargar cada archivo.
                </div>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col">
                <a href="{% static 'files/Revista_Julio_210712.pdf' %}" class="btn btn-outline-dark" download="">Revista digital Julio</a>
            </div>
<!--            Esto embebe el contenido es decir lo muestra dentro de la pagina-->
            <div class="col">
                <embed src="/static/files/Revista_Julio_210712.pdf" type="application/pdf" width="100%" height="600px"/>
            </div>
        </div>
    </div>
</section>

{% endblock %}
