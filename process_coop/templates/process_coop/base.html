<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--Template tag load static-->
    {% load static %}

    <!--Favicon-->
    <link rel="shortcut icon" href="{% static 'img/favicon_gcs.png' %}">

    <!--Enlace CSS Bootstrap-->
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <!--Enlace CSS fonts-->
    <link rel="stylesheet" href="{% static 'css/style_font.css' %}">
    <!--Enlace CSS local-->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <!--Enlace CSS AOS-->
    <link rel="stylesheet" href="{% static 'css/aos.css' %}">
    
    <title>GCS Coop | {% block title %} {% endblock %}</title>
</head>
<body>
    <!--Navbar de sitio-->
    <header>
        <div class="container-fluid">
            <nav class="navbar navbar-expand-lg navbar-light bg-light">
                <a class="navbar-brand" href="{% url 'home' %}">
                    <img id="nav_logo" src="{% static 'img/logo_gcs.png' %}" alt="logo_gcs">
                </a>
                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
    
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                  <ul class="navbar-nav ml-auto">
                    {% if request.user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'dashboard' %}">Regresar</a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">Mi cuenta</a>
                            <div class="dropdown-menu" aria-labelledby="navbarDropdown">
                                <a class="dropdown-item" href="{% url 'logout' %}">Cerrar sesión</a>
                            </div>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'home' %}">Regresar</a>
                        </li>
                    {% endif %}
                  </ul>
                </div>
            </nav>
        </div>
    </header>
    <!--Contenido principal-->
    <main>
        {% block content %} {% endblock %}
    </main>
    <!--Footer de sitio-->
    <footer id="footer">
        <div class="container-fluid">
            <div class="row">
                
                <div class="col-lg col-md col-sm col-12">
                    <img id="footer_logo" src="{% static 'img/logo_gcs.png' %}" class="img-fluid" alt="logo_footer">
                </div>
                
                <div class="col-lg-12 col-md-12 col-sm-12 col-12">
                    <small>Powered by Quantum Qwerty.</small>
                </div>
            </div>
        </div>
    </footer>
    <script src="{% static 'js/aos.js' %}"></script>
    <script>
        AOS.init()
    </script>

    <!--JQuery-->
    <script src="{% static 'js/jquery-3.4.1.min.js' %}"></script>
    <!--JS-->
    <script src="{% static 'js/bootstrap.min.js' %}"></script>

    <script src="{% static 'js/traductions.js' %}"></script>
</html>
