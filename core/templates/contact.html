{% extends 'base.html' %}
{% load static %}

{% block title %}
    Contacto
{% endblock %}

{% block content %}
<section id="contacto">
    <div class="container mt-3">
        <div class="row">
            <div class="col-lg-6 col-md-6 col-12 d-block d-sm-none">
                <img src="{% static 'img/contact.jfif' %}" class="img-fluid" alt="contact">
            </div>
            <div class="col-lg-6 col-md-6 col-12">
                <h1>Contacto</h1>
                <form method="POST">
                    {% csrf_token %}
                    <div class="form-row mb-2">
                        <div class="col-lg-6 col-md-6 col-12">
                            <label>Nombres</label>
                            <input required type="text" class="form-control" placeholder="Ingresa tu nombre(s)" name="first_name">
                        </div>
                        <div class="col-lg-6 col-md-6 col-12">
                            <label>Apellidos</label>
                            <input required type="text" class="form-control" placeholder="Ingresa tus apellidos" name="last_name">
                        </div>
                    </div>
                    <div class="form-row mb-2">
                        <div class="col">
                            <label>Correo electrónico</label>
                            <input required type="email" class="form-control" placeholder="Ingresa tu correo" name="email">
                        </div>
                    </div>
                    <div class="form-row mb-2">
                        <div class="col">
                            <label>Mensaje</label>
                            <textarea required class="form-control"rows="3" placeholder="Ingresa un mensaje aquí" name="message"></textarea>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-outline-dark btn-lg btn-block mb-3">Enviar</button>
                </form>
            </div>
            <div class="col-lg-6 col-md-6 col-12">
                <img src="{% static 'img/contact.jfif' %}" class="img-fluid d-none d-sm-block" alt="contact">
            </div>
        </div>
    </div>
</section>
{% endblock %}
